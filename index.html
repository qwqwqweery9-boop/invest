<div class="custom-modal-overlay" id="settingsModal">
        <div class="custom-modal-box">
            <div class="custom-modal-title">⚙️ 系統設定</div>
            <div class="custom-modal-msg">設定後，價格警報將自動發送至指定信箱。</div>
            
            <div style="margin-bottom: 12px;">
                <label class="form-label">接收警報的 Email</label>
                <input type="email" id="userEmailInput" class="custom-modal-input" placeholder="example@gmail.com" style="display:block; width:100%; margin-bottom: 15px;">
            </div>

            <div class="custom-modal-actions">
                <button class="modal-btn modal-btn-cancel" onclick="closeSettingsModal()">取消</button>
                <button class="modal-btn modal-btn-confirm" onclick="saveSettings()">儲存設定</button>
            </div>
        </div>
    </div>

<script>
        // ====== 系統設定儲存 (新增 Email) ======
        function openSettingsModal() { 
            document.getElementById('settingsModal').classList.add('show'); 
            document.getElementById('userEmailInput').value = localStorage.getItem('userAlertEmail') || '';
        }
        function closeSettingsModal() { document.getElementById('settingsModal').classList.remove('show'); }
        function saveSettings() {
            const email = document.getElementById('userEmailInput').value.trim();
            localStorage.setItem('userAlertEmail', email);
            closeSettingsModal();
            showCustomModal({ type: 'alert', title: '✅ 設定成功', message: '接收信箱已更新！' });
        }

        // ====== 價格警報邏輯 (改為抓取用戶自訂 Email) ======
        async function checkPriceAlertTrigger(id, currentPrice) {
            const alertConfig = priceAlerts[id];
            if (!alertConfig || alertConfig.triggered) return;

            let shouldTrigger = false;
            if (alertConfig.direction === 'up' && currentPrice >= alertConfig.target) shouldTrigger = true;
            if (alertConfig.direction === 'down' && currentPrice <= alertConfig.target) shouldTrigger = true;

            if (shouldTrigger) {
                alertConfig.triggered = true;
                localStorage.setItem('userPriceAlerts', JSON.stringify(priceAlerts));
                
                const alertEmail = localStorage.getItem('userAlertEmail');
                if(!alertEmail) {
                    console.log('警報觸發，但尚未設定接收 Email');
                    return;
                }

                try {
                    await fetch('/api/send-mail', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            to: alertEmail,
                            subject: `🚨 [價格警報] ${id} 觸及目標`,
                            text: `標的：${id}\n觸發條件：${alertConfig.target}\n當前最新價：${currentPrice}\n\n此為自動發送通知，請至監控面板確認。`
                        })
                    });
                } catch (err) { console.error("Email 發送失敗:", err); }
            }
        }

        // ... (其餘所有你的邏輯程式碼，我通通沒動，保持原樣) ...
    </script>
</body>
</html>
